/* ── 404 PAGE ── */
.page{display:flex;align-items:center;justify-content:center;

.inner{text-align:center;max-width:440px;}
.code{font-family:var(--logo-font);font-size:clamp(80px,15vw,140px);font-weight:700;line-height:1;
  background:linear-gradient(135deg,#a78bfa,#67e8f9);

.icon{font-size:48px;margin-bottom:16px;}
h1{font-size:clamp(26px,5vw,40px);font-weight:900;color:var(--tx);margin-bottom:12px;line-height:1.15;}

.sub{font-size:17px;color:var(--mu);margin-bottom:36px;line-height:1.65;}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-p{padding:12px 28px;background:var(--ac);color:#fff;border-radius:10px;
  text-decoration:none;font-weight:700;font-size:16px;transition:all .2s;}
.btn-p:hover{background:var(--ac2);transform:translateY(-2px);}
.btn-s{padding:12px 28px;background:transparent;color:var(--tx2);
  border:1px solid var(--bd);border-radius:10px;text-decoration:none;
  font-weight:600;font-size:16px;transition:all .2s;}
.btn-s:hover{border-color:var(--ac);color:var(--ac);}

<button id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="กลับด้านบน">↑</button>
