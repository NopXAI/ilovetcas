<script>
// ── Config ─────────────────────────────────────────────────────
const SB_URL=SiteConfig.SB_URL;
const SB_KEY=SiteConfig.SB_KEY;
const RNAMES=['Portfolio','Quota','Admission','Direct','รับตรง'];
const CAT={วิศวกรรม:['วิศวกรรม','เทคโนโลยี','คอมพิวเตอร์','สารสนเทศ'],แพทย์:['แพทย','เภสัช','พยาบาล','ทันตแพทย','สาธารณสุข'],วิทยาศาสตร์:['วิทยาศาสตร์','เกษตร','วนศาสตร์'],บริหาร:['บริหาร','เศรษฐศาสตร์','การบัญชี'],ครุศาสตร์:['ครุศาสตร์','ศึกษาศาสตร์'],ศิลปะ:['ศิลป','สถาปัตย','นิเทศ'],สังคม:['นิติ','รัฐศาสตร์','อักษร','มนุษย','สังคม']};

// ── Helpers ────────────────────────────────────────────────────
function gcat(n){for(const[c,ks]of Object.entries(CAT))if(ks.some(k=>n.includes(k)))return c;return'อื่นๆ';}
function fseats(f){return[f.r1,f.r2,f.r3,f.r4,f.r5].reduce((a,v)=>a+(v||0),0);}

function getEmoji(n){
  const m={'จุฬา':'🏛️','ธรรมศาสตร์':'🔴','มหิดล':'💙','เกษตร':'🌾','พระจอมเกล้าธนบุรี':'🔧','ลาดกระบัง':'⚡','พระนครเหนือ':'🏗️','ศรีนครินทรวิโรฒ':'🎓','ศิลปากร':'🎨','บูรพา':'🌊','เชียงใหม่':'🌸','นเรศวร':'⚔️','แม่ฟ้าหลวง':'🍃','แม่โจ้':'🌱','พะเยา':'🏔️','ขอนแก่น':'🌻','มหาสารคาม':'🐘','อุบลราชธานี':'🌿','นครพนม':'🦚','สงขลา':'🏝️','วลัยลักษณ์':'🌴','ทักษิณ':'🎏','ราชภัฏ':'📚','ราชมงคล':'🔩','รังสิต':'🌟','กรุงเทพ':'🏙️'};
  for(const[k,v]of Object.entries(m))if(n.includes(k))return v;
  return'🎓';
}

function normalizeType(t){
  if(!t)return'';
  if(t.includes('ราชภัฏ'))return'ราชภัฏ';
  if(t.includes('ราชมงคล'))return'ราชมงคล';
  if(t.includes('เอกชน')||t==='Private')return'เอกชน';
  if(t.includes('รัฐบาล')||t==='Public'||t==='Government')return'รัฐบาล';
  return t;
}

function mergeRows(rows){
  const um={};
  for(const r of rows){
    if(!um[r.uni_id])um[r.uni_id]={
      id:r.uni_id,name_th:r.uni_name_th,name_en:r.uni_name_en||'',
      uni_type:normalizeType(r.uni_type),emoji:getEmoji(r.uni_name_th),
      faculties:[],_fm:{}
    };
    const u=um[r.uni_id];
    if(!u._fm[r.faculty_id])u._fm[r.faculty_id]={
      id:r.faculty_id,name_th:r.faculty_name_th||'',
      tuition:r.tuition_per_year||null,criteria:r.criteria||'',
      min_score:null,r1:0,r2:0,r3:0,r4:0,r5:0
    };
    const f=u._fm[r.faculty_id];
    if(r.round_num>=1&&r.round_num<=5)f['r'+r.round_num]=(f['r'+r.round_num]||0)+(r.seats||0);
    if(r.min_score&&(!f.min_score||r.min_score<f.min_score))f.min_score=parseFloat(r.min_score);
  }
  return Object.values(um).map(u=>({...u,faculties:Object.values(u._fm),_fm:undefined})).filter(u=>u.faculties.length);
}

// ── State ──────────────────────────────────────────────────────
let allData=[];
let selected=[];
function allFacs(){return allData.flatMap(u=>u.faculties.map(f=>({...f,_u:u})));}

// ── Load ───────────────────────────────────────────────────────
async function loadData(){
  document.getElementById('chipArea').innerHTML='<div style="color:var(--mu);font-size:13px;padding:8px">กำลังโหลดข้อมูล...</div>';
  try{
    allData=mergeRows(await SiteConfig.fetchAdmissions({ year: SiteConfig.tcasYear(), limit: 9999 }));
  }catch(e){
    console.warn('Supabase error:',e.message);
    try{
      allData=await SiteConfig.fetchLocalData();
    }catch(localErr){
      console.warn('Local JSON error:', localErr.message);
      document.getElementById('chipArea').innerHTML='<div style="color:var(--rd);font-size:13px;padding:8px">⚠️ โหลดข้อมูลไม่ได้ กรุณา refresh</div>';
      return;
    }
  }
  const ids=new URLSearchParams(location.search).get('ids');
  if(ids){
    ids.split(',').forEach(id=>{
      const f=allFacs().find(f=>f.id===id);
      if(f&&selected.length<4)selected.push(f);
    });
  }
  document.getElementById('selCount').textContent=`${selected.length}/4`;
  filterChips();
  renderTable();
}

// ── Chips ──────────────────────────────────────────────────────
function filterChips(){
  const q=document.getElementById('addSearch').value.toLowerCase();
  let facs=allFacs();
  if(q)facs=facs.filter(f=>f.name_th.includes(q)||f._u.name_th.includes(q));
  facs=facs.slice(0,60);
  document.getElementById('chipArea').innerHTML=facs.map(f=>{
    const inSel=selected.some(s=>s.id===f.id);
    return`<button class="add-chip${inSel?' sel':''}" onclick="toggleSel('${f.id}')">
      ${f._u.emoji||'🎓'} ${f.name_th} <span style="opacity:.6;font-size:11px">${f._u.name_th.replace('มหาวิทยาลัย','ม.')}</span>
    </button>`;
  }).join('');
}

function toggleSel(id){
  const f=allFacs().find(f=>f.id===id);
  if(!f)return;
  const idx=selected.findIndex(s=>s.id===id);
  if(idx===-1){if(selected.length>=4)return;selected.push(f);}
  else selected.splice(idx,1);
  document.getElementById('selCount').textContent=`${selected.length}/4`;
  filterChips();
  renderTable();
}

function removeSel(id){toggleSel(id);}

// ── Table ──────────────────────────────────────────────────────
function renderTable(){
  const el=document.getElementById('cmpArea');
  if(!selected.length){
    el.innerHTML='<div class="empty-cmp"><div class="empty-ico">⚖️</div><div class="empty-msg">เลือกคณะด้านบนเพื่อเริ่ม</div></div>';
    return;
  }
  const scores=selected.map(f=>f.min_score).filter(Boolean);
  const mxSc=scores.length?Math.max(...scores):0;
  const mnSc=scores.length?Math.min(...scores):0;
  const allSeats=selected.map(f=>fseats(f));
  const mxSt=Math.max(...allSeats)||1;

  let html=`<div class="cmp-wrap"><table class="cmp-tbl"><thead><tr><th style="width:130px">—</th>`;
  for(const f of selected){
    html+=`<th class="fac-hdr">
      <div class="fh-logo">${f._u.emoji||'🎓'}</div>
      <div class="fh-name">${f.name_th}</div>
      <div class="fh-uni">${f._u.name_th}</div>
      <span class="fh-badge tb-${f._u.uni_type}">${f._u.uni_type}</span><br>
      <button class="btn-del" onclick="removeSel('${f.id}')">ลบออก</button>
    </th>`;
  }
  html+=`</tr></thead><tbody>`;

  const rows=[
    {label:'กลุ่มสาขา',    render:(f)=>`<strong>${gcat(f.name_th)}</strong>`},
    {label:'ที่นั่งรวม',   render:(f,i)=>{
      const s=allSeats[i],pct=Math.round(s/mxSt*100);
      return`<div class="v-num">${s.toLocaleString()}</div><div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></div>`;
    }},
    {label:'รอบที่เปิดรับ',render:(f)=>`<div class="rpills">${[1,2,3,4,5].map(r=>{
      const s=f['r'+r]||0;
      return`<span class="rp${s>0?' has':''}">${RNAMES[r-1].substring(0,4)}${s>0?' '+s:''}</span>`;
    }).join('')}</div>`},
    {label:'คะแนนขั้นต่ำ',render:(f)=>{
      if(!f.min_score)return`<span class="v-na">—</span>`;
      const cls=f.min_score===mxSc?'v-best':f.min_score===mnSc?'v-worst':'';
      const pct=Math.round(f.min_score);
      return`<div class="v-num ${cls}">${f.min_score.toFixed(2)}</div><div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></div>`;
    }},
    {label:'ค่าเทอม / ปี', render:(f)=>{
      if(f.tuition===null||f.tuition===undefined)return`<span class="v-na">—</span>`;
      return`<div class="v-num${f.tuition===0?' v-best':''}">${f.tuition===0?'ฟรี':`${(f.tuition/1000).toFixed(0)}K`}</div>${f.tuition?`<div class="v-sub">บาท/ปี</div>`:''}`;
    }},
    {label:'เกณฑ์คัดเลือก',render:(f)=>`<div class="criteria-txt">${f.criteria||'—'}</div>`},
  ];

  for(const row of rows){
    html+=`<tr><td class="row-lbl">${row.label}</td>`;
    for(let i=0;i<selected.length;i++)html+=`<td>${row.render(selected[i],i)}</td>`;
    html+=`</tr>`;
  }
  html+=`</tbody></table></div>`;
  el.innerHTML=html;
}

// ── Init ───────────────────────────────────────────────────────
loadData();

      document.body.appendChild(el);setTimeout(()=>el.remove(),5000);
    }
  });
  let n=0,t;
  document.querySelector('.logo')?.addEventListener('click',e=>{
    e.preventDefault();n++;clearTimeout(t);t=setTimeout(()=>n=0,1200);
    if(n===5){n=0;const d=document.createElement('div');
      d.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ac);color:#fff;padding:10px 22px;border-radius:100px;font-family:"IBM Plex Mono",monospace;font-size:13px;z-index:9999;pointer-events:none;white-space:nowrap';
      d.textContent='👋 Noppadon Pumpong';document.body.appendChild(d);setTimeout(()=>d.remove(),2500);}
  });

</script>
