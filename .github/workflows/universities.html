let UNIS=[];
const ST={q:'',type:'',region:'',view:'grid'};

function normalizeRegion(r){
  if(!r) return '';
  r=r.replace('ภาค','').trim();
  const map={'central':'กลาง','north':'เหนือ','northeast':'อีสาน','south':'ใต้','east':'ตะวันออก','isan':'อีสาน','isaan':'อีสาน'};
  const lower=r.toLowerCase();
  if(map[lower]) return map[lower];
  return r;
}

async function loadData(){
  document.getElementById('mainContent').innerHTML=`
    <div class="skel-hdr skel"></div>
    <div class="skel-hdr skel" style="animation-delay:.1s"></div>
    <div class="skel-hdr skel" style="animation-delay:.2s"></div>`;

  const aggregateRows = (rows) => {
    const um={};
    const facSeatMap={};
    for(const row of rows){
      if(!um[row.uni_id]) um[row.uni_id]={
        id:row.uni_id,
        name_th:row.uni_name_th,
        name_en:row.uni_name_en||'',
        uni_type:row.uni_type||'',
        location:row.location||getLocation(row.uni_name_th||''),
        region:normalizeRegion(row.region)||getRegion(row.uni_name_th||'',row.location||''),
        emoji:SiteConfig.getEmoji(row.uni_name_th),
        faculties:0,
        seats:0,
      };
      if(!facSeatMap[row.uni_id]) facSeatMap[row.uni_id]={};
      if(!facSeatMap[row.uni_id][row.faculty_id]) facSeatMap[row.uni_id][row.faculty_id]=0;
      facSeatMap[row.uni_id][row.faculty_id]+=(row.seats||0);
    }
    for(const [uid, facMap] of Object.entries(facSeatMap)){
      if(!um[uid]) continue;
      um[uid].faculties=Object.keys(facMap).length;
      um[uid].seats=Object.values(facMap).reduce((a,v)=>a+v,0);
    }
    return Object.values(um).sort((a,b)=>a.name_th.localeCompare(b.name_th,'th'));
  };

  try{
    const rows = await SiteConfig.fetchAdmissions({
      year: SiteConfig.tcasYear(),
      select: 'uni_id,uni_name_th,uni_name_en,uni_type,location,region,faculty_id,seats',
      limit: 9999,
    });
    UNIS = aggregateRows(rows);
  }catch(e){
    console.warn('Supabase error:', e.message);
    try{
      const local = await SiteConfig.fetchLocalData();
      UNIS = local.map((u) => ({
        id:u.id,
        name_th:u.name_th,
        name_en:u.name_en||'',
        uni_type:u.uni_type||'',
        location:u.location||getLocation(u.name_th||''),
        region:normalizeRegion(u.region)||getRegion(u.name_th||'',u.location||''),
        emoji:u.emoji||SiteConfig.getEmoji(u.name_th),
        faculties:(u.faculties||[]).length,
        seats:(u.faculties||[]).reduce((sum,f)=>sum+((f.r1||0)+(f.r2||0)+(f.r3||0)+(f.r4||0)+(f.r5||0)),0),
      })).sort((a,b)=>a.name_th.localeCompare(b.name_th,'th'));
    }catch(localErr){
      console.warn('Local JSON error:', localErr.message);
      document.getElementById('mainContent').innerHTML='<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-msg">โหลดข้อมูลไม่ได้ กรุณา refresh</div></div>';
      return;
    }
  }
  boot();
}

// normalize uni_type จาก DB ให้ตรงกับ key ที่ใช้ใน UI
function normalizeType(t){
  if(!t) return '';
  if(t.includes('ราชภัฏ')) return 'ราชภัฏ';
  if(t.includes('ราชมงคล')) return 'ราชมงคล';
  if(t.includes('เอกชน')||t==='Private') return 'เอกชน';
  if(t.includes('รัฐบาล')||t==='Public'||t==='Government') return 'รัฐบาล';
  return t;
}


function boot(){
  // normalize uni_type ทุกตัวหลังโหลดข้อมูล
  UNIS.forEach(u=>{ u.uni_type=normalizeType(u.uni_type); });
  document.getElementById('sTotal').textContent=UNIS.length;
  document.getElementById('sState').textContent=UNIS.filter(u=>u.uni_type==='รัฐบาล').length;
  document.getElementById('sPriv').textContent=UNIS.filter(u=>u.uni_type==='เอกชน').length;
  document.getElementById('sRaj').textContent=UNIS.filter(u=>u.uni_type==='ราชภัฏ'||u.uni_type==='ราชมงคล').length;
  render();
}

function filtered(){
  const q=ST.q.toLowerCase();
  return UNIS.filter(u=>{
    if(q&&!u.name_th.includes(q)&&!(u.name_en||'').toLowerCase().includes(q)&&!(u.location||'').includes(q))return false;
    if(ST.type&&u.uni_type!==ST.type)return false;
    if(ST.region&&u.region!==ST.region)return false;
    return true;
  });
}

function render(){
  const data=filtered();
  document.getElementById('resCount').textContent=data.length;
  // sync hero stats กับ filtered result
  // sTotal = total เสมอ, resCount = filtered
  document.getElementById('sTotal').textContent=UNIS.length;
  document.getElementById('emptyState').style.display=data.length?'none':'block';
  const el=document.getElementById('mainContent');
  if(!data.length){el.innerHTML='';return;}
  const TYPES=['รัฐบาล','เอกชน','ราชภัฏ','ราชมงคล'];
  if(!ST.type){
    el.innerHTML=TYPES.map(t=>{
      const g=data.filter(u=>u.uni_type===t);
      if(!g.length)return'';
      return`<div class="sec-hdr"><span class="sec-title">${t}</span><span class="sec-count">${g.length}</span><div class="sec-line"></div></div>
      ${ST.view==='grid'?`<div class="uni-grid">${g.map((u,i)=>gridCard(u,i)).join('')}</div>`:`<div class="uni-list">${g.map((u,i)=>listRow(u,i)).join('')}</div>`}`;
    }).join('');
  } else {
    el.innerHTML=ST.view==='grid'?`<div class="uni-grid">${data.map((u,i)=>gridCard(u,i)).join('')}</div>`:`<div class="uni-list">${data.map((u,i)=>listRow(u,i)).join('')}</div>`;
  }
}

function gridCard(u,i){
  return`<a class="uni-card" href="/university?id=${u.id}" style="animation-delay:${i*.03}s">
    <div class="card-top">
      <div class="card-logo">${u.emoji||'🎓'}</div>
      <div style="flex:1;min-width:0"><div class="card-name">${u.name_th}</div><div class="card-en">${u.name_en||''}</div></div>
      <span class="card-badge tb-${u.uni_type}">${u.uni_type}</span>
    </div>
    <div class="card-stats">
      <div class="cs"><div class="cs-n">${u.faculties}</div><div class="cs-l">คณะ</div></div>
      <div class="cs"><div class="cs-n">${(u.seats||0).toLocaleString()}</div><div class="cs-l">ที่นั่ง</div></div>
      <div class="cs"><div class="cs-n">${u.region||'—'}</div><div class="cs-l">ภาค</div></div>
    </div>
    <div class="card-loc"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${u.location||''}</div>
  </a>`;
}

function listRow(u,i){
  return`<a class="uni-row" href="/university?id=${u.id}" style="animation-delay:${i*.02}s">
    <div class="row-logo">${u.emoji||'🎓'}</div>
    <div style="flex:1;min-width:0"><div class="row-name">${u.name_th}</div><div class="row-en">${u.name_en||''}</div></div>
    <div><div class="row-num">${u.faculties}</div><div class="row-label">คณะ</div></div>
    <div><div class="row-num">${(u.seats||0).toLocaleString()}</div><div class="row-label">ที่นั่ง</div></div>
    <span class="card-badge tb-${u.uni_type}">${u.uni_type}</span>
    <div class="row-loc">${u.location||''}</div>
  </a>`;
}

function setView(v){
  ST.view=v;
  document.getElementById('vGrid').classList.toggle('active',v==='grid');
  document.getElementById('vList').classList.toggle('active',v==='list');
  render();
}

let dbt;
document.getElementById('searchInput').addEventListener('input',e=>{clearTimeout(dbt);dbt=setTimeout(()=>{ST.q=e.target.value.trim();render();},300);});
document.querySelectorAll('.ftab[data-type]').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.ftab[data-type]').forEach(x=>x.classList.remove('active'));b.classList.add('active');ST.type=b.dataset.type;render();});});
document.getElementById('regionFilter').addEventListener('change',e=>{ST.region=e.target.value;render();});
