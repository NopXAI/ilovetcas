function normalizeType(t){
  if(!t) return '';
  if(t.includes('ราชภัฏ')) return 'ราชภัฏ';
  if(t.includes('ราชมงคล')) return 'ราชมงคล';
  if(t.includes('เอกชน')||t==='Private') return 'เอกชน';
  if(t.includes('รัฐบาล')||t==='Public'||t==='Government') return 'รัฐบาล';

}

function mergeRows(rows,uniId){
  const uniRow=rows[0]||{};
  const uni={
    id:uniId,
    name_th:uniRow.uni_name_th||uniId,
    name_en:uniRow.uni_name_en||'',
    uni_type:normalizeType(uniRow.uni_type),
    location:uniRow.location||getLocation(uniRow.uni_name_th||''),
    region:uniRow.region||getRegion(uniRow.uni_name_th||'',uniRow.location||''),
    emoji:getEmoji(uniRow.uni_name_th||''),
    website:uniRow.website||'',
    founded:uniRow.founded||'',
    faculties:[],_fm:{},
  };
  for(const r of rows){
    if(!uni._fm[r.faculty_id]) uni._fm[r.faculty_id]={
      id:r.faculty_id,name_th:r.faculty_name_th||'',
      tuition:r.tuition_per_year||null,criteria:r.criteria||'',
      min_score:null,r1:0,r2:0,r3:0,r4:0,r5:0,history:[],
    };
    const f=uni._fm[r.faculty_id];
    if(r.round_num>=1&&r.round_num<=5)f[`r${r.round_num}`]=(f[`r${r.round_num}`]||0)+(r.seats||0);
    if(r.min_score&&(!f.min_score||r.min_score<f.min_score))f.min_score=parseFloat(r.min_score);
    // เก็บ history — year มาจาก column 'year' ใน view
    if(r.min_score&&r.year){
      const yr=parseInt(r.year);
      if(!isNaN(yr)&&!f.history.some(h=>h.year===yr&&h.round===r.round_num))
        f.history.push({year:yr,round:r.round_num,score:parseFloat(r.min_score),seats:r.seats||0});
    }
  }
  uni.faculties=Object.values(uni._fm);
  delete uni._fm;
  return uni;
}

async function loadData(){
  const uniId=new URLSearchParams(location.search).get('id')||'u001';
  document.getElementById('heroEl').innerHTML=`<div class="hero"><div class="hero-inner"><div class="skel" style="height:120px;border-radius:14px"></div></div></div>`;
  try{
    const rows = await SiteConfig.fetchAdmissions({ yearGte: SiteConfig.tcasYear() - 3, uniId, limit: 9999 });
    if(rows.length){
      boot(mergeRows(rows,uniId));
      return;
    }
  }catch(e){
    console.warn('Supabase error:',e.message);
  }
  try{
    const local = await SiteConfig.fetchLocalData();
    const uni = local.find((u) => u.id === uniId);
    if(!uni){
      document.getElementById('heroEl').innerHTML='<div class="hero"><div class="hero-inner"><div class="empty"><div class="empty-ico">🔍</div><div class="empty-msg">ไม่พบมหาวิทยาลัยนี้</div></div></div></div>';
      return;
    }
    boot(uni);
  }catch(localErr){
    console.warn('Local JSON error:',localErr.message);
    document.getElementById('heroEl').innerHTML='<div class="hero"><div class="hero-inner"><div class="empty"><div class="empty-ico">⚠️</div><div class="empty-msg">โหลดข้อมูลไม่ได้ กรุณา refresh</div></div></div></div>';
  }
}

// ── HISTORY ───────────────────────────────────────────────────
(function(){
  const allHist=facs.flatMap(f=>(f.history||[]).map(h=>({...h,fac:f.name_th})));
  allHist.sort((a,b)=>b.year-a.year||b.round-a.round);
  let html='';
  if(!allHist.length){
    html='<div class="empty"><div class="empty-ico">📊</div><div>ยังไม่มีข้อมูลคะแนนย้อนหลัง</div></div>';
  } else {
    html=`<table class="hist-table">
      <thead><tr><th>ปี</th><th>คณะ</th><th>รอบ</th><th>คะแนนขั้นต่ำ</th><th>ที่นั่ง</th></tr></thead>
      <tbody>
        ${allHist.map((h,i)=>{
          const prev=allHist[i+1];
          const trend=prev&&prev.fac===h.fac?(h.score>prev.score?'▲':'▼'):'';
          const cls=trend==='▲'?'trend-up':trend==='▼'?'trend-dn':'';
          return`<tr><td>${h.year}</td><td>${h.fac}</td><td>รอบ ${h.round}</td>
            <td style="font-family:var(--mono);font-weight:700">${h.score.toFixed(2)} <span class="${cls}" style="font-size:11px">${trend}</span></td>
            <td style="font-family:var(--mono)">${h.seats.toLocaleString()}</td></tr>`;
        }).join('')}
      </tbody></table>`;
  }
  document.getElementById('historyEl').innerHTML=html;
})();

renderFacTable();

// ── FACULTIES ─────────────────────────────────────────────────
function renderFacTable(){
  const facs=_facs; const activeCat=_activeCat; const uni=_uni;
  const cats=[...new Set(facs.map(f=>gcat(f.name_th)))];
  const shown=activeCat?facs.filter(f=>gcat(f.name_th)===activeCat):facs;
  const mxSc=Math.max(...shown.map(f=>f.min_score||0));

  document.getElementById('facultiesEl').innerHTML=`
    <div class="fac-filter-row">
      <button class="fftab${!activeCat?' active':''}" onclick="setCat('')">ทั้งหมด (${facs.length})</button>
      ${cats.map(c=>`<button class="fftab${activeCat===c?' active':''}" onclick="setCat('${c}')">${c} (${facs.filter(f=>gcat(f.name_th)===c).length})</button>`).join('')}
    </div>
    <div style="overflow-x:auto">
    <table class="fac-table">
      <thead><tr>
        <th>คณะ / สาขา</th>
        <th>คะแนนขั้นต่ำ</th>
        <th>รอบ</th>
        <th>ที่นั่ง</th>
        <th>ค่าเทอม</th>
      </tr></thead>
      <tbody>
        ${shown.map(f=>{
          const cat=gcat(f.name_th);
          const sc=f.min_score;
          const pct=mxSc?Math.round((sc||0)/mxSc*100):0;
          const tu=f.tuition===0?'<span class="tu-free">ฟรี</span>':f.tuition?`<span class="tu-val">${(f.tuition/1000).toFixed(0)}K</span>`:'<span class="tu-val">—</span>';
          const rps=[1,2,3,4,5].map(r=>`<div class="rp${(f[`r${r}`]||0)>0?' has':''}">${r}</div>`).join('');
          return`<tr onclick="openFac('${f.id}')">
            <td><div class="fac-name"><span class="cat-dot dot-${cat}"></span>${f.name_th}</div><div class="fac-cat">${cat}</div></td>
            <td>${sc?`<div class="score-val">${sc.toFixed(2)}</div><div class="score-bar-wrap"><div class="score-bar"><div class="score-fill" style="width:${pct}%"></div></div></div>`:'<span style="color:var(--border2);font-family:var(--mono)">—</span>'}</td>
            <td><div class="r-pips">${rps}</div></td>
            <td><span style="font-family:var(--mono);font-weight:600">${fseats(f).toLocaleString()}</span></td>
            <td>${tu}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>`;
}

function setCat(c){_activeCat=c;renderFacTable();}


// ── FAC MODAL ─────────────────────────────────────────────────
function openFac(fid){
  const facs=_facs; const uni=_uni;
  const f=facs.find(f=>f.id===fid);if(!f)return;
  document.getElementById('md_title').textContent=f.name_th;
  document.getElementById('md_sub').textContent=`${uni.name_th} · ${gcat(f.name_th)}`;
  document.getElementById('md_seats').textContent=fseats(f).toLocaleString()+' คน';
  document.getElementById('md_score').textContent=f.min_score?f.min_score.toFixed(2):'—';
  document.getElementById('md_tuition').textContent=f.tuition===0?'ฟรี':f.tuition?`${f.tuition.toLocaleString()} บาท`:'—';
  document.getElementById('md_cat').textContent=gcat(f.name_th);
  document.getElementById('md_criteria').textContent=f.criteria||'—';
  document.getElementById('md_rounds').innerHTML=[1,2,3,4,5].map(r=>{
    const s=f[`r${r}`]||0;
    return`<div class="m-rd${s>0?' has':' none'}">
      <div class="m-rd-l">รอบ ${r}</div>
      <div class="m-rd-n">${RNAMES[r-1]}</div>
      <div class="m-rd-v">${s>0?s.toLocaleString():'—'}</div>
    </div>`;
  }).join('');
  document.getElementById('facModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('facModal').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

document.querySelectorAll('.tab-btn').forEach(btn=>{

    btn.classList.add('active');
    document.getElementById('tp_'+btn.dataset.tab).classList.add('active');
  });
});
